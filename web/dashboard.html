<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Load Balancer — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f8f9fb;
            --white: #ffffff;
            --border: #e5e7eb;
            --border-light: #f0f1f3;
            --text: #111827;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --accent: #4f46e5;
            --accent-light: #eef2ff;
            --green: #059669;
            --green-bg: #ecfdf5;
            --green-border: #a7f3d0;
            --red: #dc2626;
            --red-bg: #fef2f2;
            --red-border: #fecaca;
            --amber: #d97706;
            --amber-bg: #fffbeb;
            --amber-border: #fde68a;
            --radius: 12px;
            --radius-sm: 6px;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Shell */
        .shell {
            max-width: 1160px;
            margin: 0 auto;
            padding: 32px 24px 48px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo svg {
            width: 18px;
            height: 18px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .ws-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            background: var(--red-bg);
            color: var(--red);
            border: 1px solid var(--red-border);
            transition: all 0.3s;
        }

        .ws-badge.live {
            background: var(--green-bg);
            color: var(--green);
            border-color: var(--green-border);
        }

        .ws-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .clock {
            font-size: 13px;
            color: var(--text-tertiary);
            font-variant-numeric: tabular-nums;
        }

        /* Metric cards */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }

        .kpi {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow-sm);
        }

        .kpi-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -1.2px;
            color: var(--text);
        }

        .kpi-value.green {
            color: var(--green);
        }

        .kpi-value.accent {
            color: var(--accent);
        }

        /* Section label */
        .section-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 12px;
        }

        /* Server table */
        .table-wrap {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            margin-bottom: 28px;
        }

        .server-table {
            width: 100%;
            border-collapse: collapse;
        }

        .server-table th {
            text-align: left;
            padding: 10px 18px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-tertiary);
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        .server-table td {
            padding: 14px 18px;
            font-size: 13px;
            color: var(--text);
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
        }

        .server-table tbody tr:last-child td {
            border-bottom: none;
        }

        .server-table tbody tr:hover td {
            background: #fafbfc;
        }

        .srv-name {
            font-weight: 600;
            font-size: 14px;
        }

        .srv-url {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 1px;
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .badge.healthy {
            background: var(--green-bg);
            color: var(--green);
        }

        .badge.down {
            background: var(--red-bg);
            color: var(--red);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .circuit-tag {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            letter-spacing: 0.3px;
        }

        .circuit-tag.closed {
            background: var(--green-bg);
            color: var(--green);
        }

        .circuit-tag.open {
            background: var(--red-bg);
            color: var(--red);
        }

        .circuit-tag.half {
            background: var(--amber-bg);
            color: var(--amber);
        }

        /* Latency bar */
        .lat-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lat-bar {
            width: 64px;
            height: 5px;
            background: var(--border-light);
            border-radius: 3px;
            overflow: hidden;
        }

        .lat-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        /* Priority */
        .pri-cell {
            font-size: 12px;
        }

        .pri-h {
            color: var(--amber);
            font-weight: 600;
        }

        .pri-l {
            color: var(--text-tertiary);
        }

        /* Charts */
        .charts-row {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 12px;
            margin-bottom: 28px;
        }

        .chart-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow-sm);
        }

        .chart-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 16px;
        }

        /* Footer */
        .footer {
            text-align: center;
            font-size: 12px;
            color: var(--text-tertiary);
            padding-top: 20px;
        }

        /* Responsive */
        @media (max-width: 960px) {
            .kpi-row {
                grid-template-columns: repeat(2, 1fr);
            }

            .charts-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .shell {
                padding: 20px 16px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .kpi-row {
                grid-template-columns: 1fr 1fr;
            }

            .table-wrap {
                overflow-x: auto;
            }

            .server-table {
                min-width: 700px;
            }
        }
    </style>
</head>

<body>
    <div class="shell">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                </div>
                <h1>Load Balancer</h1>
            </div>
            <div class="header-meta">
                <span id="ws-badge" class="ws-badge">
                    <span class="ws-dot"></span>
                    <span id="ws-text">Offline</span>
                </span>
                <span id="clock" class="clock mono"></span>
            </div>
        </header>

        <!-- KPIs -->
        <div class="kpi-row">
            <div class="kpi">
                <div class="kpi-label">Total Requests</div>
                <div id="total-req" class="kpi-value mono">0</div>
            </div>
            <div class="kpi">
                <div class="kpi-label">Success Rate</div>
                <div id="success-rate" class="kpi-value green mono">—</div>
            </div>
            <div class="kpi">
                <div class="kpi-label">Healthy Nodes</div>
                <div id="healthy-count" class="kpi-value mono">0 / 0</div>
            </div>
            <div class="kpi">
                <div class="kpi-label">Active Connections</div>
                <div id="active-conn" class="kpi-value accent mono">0</div>
            </div>
        </div>

        <!-- Server Table -->
        <div class="section-label">Backend Servers</div>
        <div class="table-wrap">
            <table class="server-table">
                <thead>
                    <tr>
                        <th>Server</th>
                        <th>Status</th>
                        <th>Requests</th>
                        <th>Latency</th>
                        <th>Active</th>
                        <th>Success</th>
                        <th>Circuit</th>
                        <th>Priority</th>
                    </tr>
                </thead>
                <tbody id="server-tbody"></tbody>
            </table>
        </div>

        <!-- Charts -->
        <div class="charts-row">
            <div class="chart-card">
                <div class="chart-title">Traffic Share</div>
                <canvas id="distChart"></canvas>
            </div>
            <div class="chart-card">
                <div class="chart-title">Latency Over Time</div>
                <canvas id="latencyChart" height="100"></canvas>
            </div>
        </div>

        <div class="footer">Adaptive Routing · Fault Tolerance · Circuit Breaker</div>
    </div>

    <script>
        // Palette
        const COLORS = ['#4f46e5', '#059669', '#d97706', '#dc2626', '#0284c7', '#7c3aed'];

        // Chart defaults
        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.font.size = 11;
        Chart.defaults.color = '#9ca3af';
        Chart.defaults.borderColor = '#f0f1f3';

        const distChart = new Chart(document.getElementById('distChart'), {
            type: 'doughnut',
            data: { labels: [], datasets: [{ data: [], backgroundColor: COLORS, borderWidth: 0 }] },
            options: {
                cutout: '68%',
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { padding: 14, usePointStyle: true, pointStyleWidth: 8, font: { size: 12 } }
                    }
                }
            }
        });

        const latHistory = {};
        const timeLabels = [];
        const MAX_PTS = 40;

        const latChart = new Chart(document.getElementById('latencyChart'), {
            type: 'line',
            data: { labels: timeLabels, datasets: [] },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: { ticks: { maxTicksLimit: 6, font: { size: 10 } }, grid: { display: false } },
                    y: {
                        beginAtZero: true,
                        ticks: { font: { size: 10 }, callback: v => v + 'ms' },
                        grid: { color: '#f3f4f6' }
                    }
                },
                plugins: {
                    legend: { labels: { usePointStyle: true, pointStyleWidth: 8, padding: 12, font: { size: 11 } } },
                    tooltip: {
                        backgroundColor: '#fff',
                        titleColor: '#111827',
                        bodyColor: '#6b7280',
                        borderColor: '#e5e7eb',
                        borderWidth: 1,
                        padding: 10,
                        cornerRadius: 8,
                        bodyFont: { family: "'JetBrains Mono', monospace", size: 11 },
                        callbacks: { label: ctx => ` ${ctx.dataset.label}  ${ctx.parsed.y.toFixed(1)}ms` }
                    }
                },
                elements: {
                    line: { tension: 0.35, borderWidth: 2 },
                    point: { radius: 0, hoverRadius: 4 }
                },
                animation: { duration: 250 }
            }
        });

        // WebSocket
        let ws;
        function connect() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${proto}//${location.host}/ws`);
            ws.onopen = () => {
                document.getElementById('ws-badge').classList.add('live');
                document.getElementById('ws-text').textContent = 'Live';
            };
            ws.onclose = () => {
                document.getElementById('ws-badge').classList.remove('live');
                document.getElementById('ws-text').textContent = 'Offline';
                setTimeout(connect, 2000);
            };
            ws.onmessage = e => update(JSON.parse(e.data));
        }

        function update(servers) {
            const entries = Object.entries(servers);
            let totalReq = 0, totalOK = 0, healthy = 0, active = 0;
            const names = [], reqs = [];

            entries.forEach(([, s]) => {
                totalReq += s.total_requests;
                totalOK += s.success_count;
                active += s.active_connections;
                if (s.is_healthy) healthy++;
                names.push(s.name);
                reqs.push(s.total_requests);
            });

            document.getElementById('total-req').textContent = totalReq.toLocaleString();
            document.getElementById('success-rate').textContent = totalReq > 0 ? (totalOK / totalReq * 100).toFixed(1) + '%' : '—';
            document.getElementById('healthy-count').textContent = `${healthy} / ${entries.length}`;
            document.getElementById('active-conn').textContent = active;

            // Table
            const maxLat = Math.max(...entries.map(([, s]) => s.avg_latency_ms), 1);
            document.getElementById('server-tbody').innerHTML = entries.map(([url, s], i) => {
                const pct = totalReq > 0 ? (s.total_requests / totalReq * 100).toFixed(1) : '0.0';
                const sr = s.total_requests > 0 ? (s.success_count / s.total_requests * 100).toFixed(1) : '—';
                const latPct = Math.min(s.avg_latency_ms / maxLat * 100, 100);
                const cc = s.circuit_state === 'CLOSED' ? 'closed' : s.circuit_state === 'OPEN' ? 'open' : 'half';
                const color = COLORS[i % COLORS.length];
                return `<tr>
                    <td>
                        <div class="srv-name" style="color:${color}">${s.name}</div>
                        <div class="srv-url mono">${url.replace('http://', '')}</div>
                    </td>
                    <td><span class="badge ${s.is_healthy ? 'healthy' : 'down'}"><span class="badge-dot"></span>${s.is_healthy ? 'Healthy' : 'Down'}</span></td>
                    <td class="mono">${s.total_requests.toLocaleString()} <span style="color:var(--text-tertiary);font-size:11px">(${pct}%)</span></td>
                    <td>
                        <div class="lat-group">
                            <span class="mono">${s.avg_latency_ms.toFixed(1)}<span style="color:var(--text-tertiary)">ms</span></span>
                            <div class="lat-bar"><div class="lat-fill" style="width:${latPct}%;background:${color}"></div></div>
                        </div>
                    </td>
                    <td class="mono">${s.active_connections}</td>
                    <td class="mono">${sr}%</td>
                    <td><span class="circuit-tag ${cc}">${s.circuit_state}</span></td>
                    <td class="pri-cell">
                        <span class="pri-h mono">${s.high_priority_count}</span>
                        <span style="color:var(--text-tertiary);margin:0 2px">/</span>
                        <span class="pri-l mono">${s.low_priority_count}</span>
                    </td>
                </tr>`;
            }).join('');

            // Dist chart
            distChart.data.labels = names;
            distChart.data.datasets[0].data = reqs;
            distChart.update();

            // Latency chart
            const now = new Date();
            timeLabels.push(now.getMinutes().toString().padStart(2, '0') + ':' + now.getSeconds().toString().padStart(2, '0'));
            if (timeLabels.length > MAX_PTS) timeLabels.shift();

            entries.forEach(([, s]) => {
                if (!latHistory[s.name]) latHistory[s.name] = [];
                latHistory[s.name].push(s.avg_latency_ms);
                if (latHistory[s.name].length > MAX_PTS) latHistory[s.name].shift();
            });

            latChart.data.datasets = entries.map(([, s], i) => ({
                label: s.name,
                data: latHistory[s.name] || [],
                borderColor: COLORS[i % COLORS.length],
                backgroundColor: COLORS[i % COLORS.length] + '10',
                fill: true,
            }));
            latChart.update();
        }

        // Clock
        function tick() {
            const d = new Date();
            document.getElementById('clock').textContent =
                d.getHours().toString().padStart(2, '0') + ':' +
                d.getMinutes().toString().padStart(2, '0') + ':' +
                d.getSeconds().toString().padStart(2, '0');
        }
        tick(); setInterval(tick, 1000);
        connect();
    </script>
</body>

</html>
